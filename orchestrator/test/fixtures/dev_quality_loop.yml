program:
  id: dev_quality_loop
  version: 1
  initial: idle
states:
  idle:
    type: passive
    on:
      start: lint
  lint:
    type: active
    node: mix_credo
    on:
      success: commit
      failure: fix
      partial: fix
  fix:
    type: active
    node: llm_fix
    on:
      success: lint
      failure: fix
      retry: fix
  commit:
    type: active
    node: git_commit
    on:
      success: done
      failure: failed
  done:
    type: final
  failed:
    type: final
nodes:
  mix_credo:
    kind: cli
    cwd: orchestrator
    command: ["mix", "credo", "--strict"]
    timeout_ms: 120000
    outcome:
      success:
        - exit_code: 0
      failure:
        - exit_code: {neq: 0}
      partial:
        - exit_code: 0
        - jq: ".warnings | length > 0"
  llm_fix:
    kind: llm
    model: auto
    prompt_file: prompts/fix_credo.md
    timeout_ms: 600000
    outcome:
      success:
        - signal: fix_complete
        - jq: '.status == "ok"'
      failure:
        - timeout: true
        - signal: refused
  git_commit:
    kind: cli
    command: ["git", "commit", "-m", "chore: auto"]
    outcome:
      success:
        - exit_code: 0
      failure:
        - exit_code: {neq: 0}
