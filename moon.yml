# Root-level workspace tasks
# https://moonrepo.dev/docs/config/project
id: 'project-template'
language: 'rust'
layer: 'application'
workspace:
  inheritedTasks:
    exclude:
      - check
      - test
tasks:
  format:
    description: 'Format the workspace with treefmt (Rust, Nix, shell, JS/TS, YAML, TOML)'
    command: 'treefmt'
    inputs:
      - 'treefmt.toml'
      - '.git/**/*'
      - '**/*.rs'
      - '**/*.nix'
      - '**/*.sh'
      - '**/*.{js,jsx,ts,tsx,json}'
      - '**/*.{yml,yaml}'
      - '**/*.toml'
      - '.github/workflows/*.yml'
    options:
      cache: false
      outputStyle: buffer-only-failure
  book-build:
    description: 'Build mdBook user guide'
    command: 'mdbook'
    args: ['build', 'book']
    inputs:
      - 'book/**'
    options:
      cache: false
      outputStyle: buffer-only-failure
