name: Release orchestrator
on:
  push:
    tags:
      - orchestrator-v*
permissions:
  contents: write
jobs:
  build:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x86_64
          - runner: macos-latest
            platform: darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"
      - name: Build portable escript
        working-directory: orchestrator
        run: |
          mix local.rebar --force
          mix local.hex --force
          mix deps.get --only prod
          MIX_ENV=prod mix escript.build
      - name: Stage release tarball
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#orchestrator-v}"
          STAGING="dist/orchestrator-${VERSION}-${PLATFORM}"
          mkdir -p "${STAGING}/bin"
          cp orchestrator/LICENSE orchestrator/README.md orchestrator/install.sh "${STAGING}/"
          cp orchestrator/orchestrator "${STAGING}/bin/orchestrator"
          chmod +x "${STAGING}/bin/orchestrator" "${STAGING}/install.sh"
          ARCHIVE="dist/orchestrator-${VERSION}-${PLATFORM}.tar.gz"
          tar -czf "${ARCHIVE}" -C dist "orchestrator-${VERSION}-${PLATFORM}"
          if command -v sha256sum >/dev/null; then
            sha256sum "${ARCHIVE}" > "dist/checksums-${PLATFORM}.txt"
          else
            shasum -a 256 "${ARCHIVE}" > "dist/checksums-${PLATFORM}.txt"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: orchestrator-${{ matrix.platform }}
          path: dist/*
  hex-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"
      - name: Publish to Hex
        working-directory: orchestrator
        env:
          MIX_ENV: prod
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          mix local.rebar --force
          mix local.hex --force
          mix deps.get --only prod
          mix hex.publish --yes
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Combine checksums
        run: cat dist/checksums-*.txt > dist/checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: orchestrator ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            install.sh
