name: Release definitively
on:
  push:
    tags:
      - definitively-v*
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to re-publish (definitively-vX.Y.Z)
        required: true
        type: string
permissions:
  contents: write
env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: erlef/setup-beam@v1
      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz
        with:
          otp-version: "27"
          elixir-version: "1.18"
      - name: Verify tag matches mix.exs version
        run: ./scripts/release/validate-version.sh "${{ env.RELEASE_TAG }}"
      - name: Run tests with coverage
        working-directory: definitively
        run: |
          mix local.rebar --force
          mix local.hex --force
          mix deps.get
          mix test --cover --exclude escript
      - name: Validate Hex package tarball
        working-directory: definitively
        run: mix hex.build
  build:
    name: build (${{ matrix.platform }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux-x86_64
          - runner: macos-latest
            platform: darwin-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"
      - name: Build portable escript
        working-directory: definitively
        run: |
          mix local.rebar --force
          mix local.hex --force
          mix deps.get --only prod
          MIX_ENV=prod mix escript.build
      - name: Verify escript init
        working-directory: definitively
        run: |
          tmp="$(mktemp -d)"
          (cd "${tmp}" && "${{ github.workspace }}/definitively/definitively" init)
          test -f "${tmp}/.definitively/programs/example.yml"
      - name: Stage release tarball
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#definitively-v}"
          STAGING="dist/definitively-${VERSION}-${PLATFORM}"
          mkdir -p "${STAGING}/bin"
          cp definitively/LICENSE definitively/README.md definitively/install.sh "${STAGING}/"
          cp definitively/definitively "${STAGING}/bin/definitively"
          chmod +x "${STAGING}/bin/definitively" "${STAGING}/install.sh"
          ARCHIVE="dist/definitively-${VERSION}-${PLATFORM}.tar.gz"
          tar -czf "${ARCHIVE}" -C dist "definitively-${VERSION}-${PLATFORM}"
          if command -v sha256sum >/dev/null; then
            sha256sum "${ARCHIVE}" > "dist/checksums-${PLATFORM}.txt"
          else
            shasum -a 256 "${ARCHIVE}" > "dist/checksums-${PLATFORM}.txt"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: definitively-${{ matrix.platform }}
          path: dist/*
  github-release:
    name: github-release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Combine checksums
        run: cat dist/checksums-*.txt > dist/checksums.txt
      - id: meta
        run: |
          VERSION="${RELEASE_TAG#definitively-v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: definitively ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            install.sh
      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: dist/checksums.txt
      - name: Release summary
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          {
            echo "## definitively v${VERSION}"
            echo
            echo "### Install"
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/Industrial/definitively/main/install.sh | bash -s -- --version definitively-v${VERSION}"
            echo '```'
            echo
            echo "### Hex"
            echo '```bash'
            echo "mix escript.install hex definitively ${VERSION} --force"
            echo '```'
            echo
            echo "### Homebrew"
            echo '```bash'
            echo "brew tap idcleartomwieland/tap https://github.com/idcleartomwieland/homebrew-tap"
            echo "brew install definitively"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
  hex-publish:
    name: hex-publish
    needs: [validate, github-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"
      - name: Publish to Hex
        working-directory: definitively
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          if [[ -z "${HEX_API_KEY}" ]]; then
            echo "HEX_API_KEY not configured; skipping Hex publish"
            exit 0
          fi
          ../scripts/release/validate-hex-key.sh
          mix local.rebar --force
          mix local.hex --force
          mix deps.get
          mix hex.publish --yes
  homebrew-tap-bump:
    name: homebrew-tap-bump
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@v4
        with:
          name: release-metadata
          path: dist
      - name: Bump Homebrew tap formula
        env:
          VERSION: ${{ needs.github-release.outputs.version }}
          CHECKSUMS_FILE: dist/checksums.txt
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            echo "HOMEBREW_TAP_TOKEN not configured; skipping Homebrew bump"
            exit 0
          fi
          ./scripts/release/bump-homebrew-tap.sh
